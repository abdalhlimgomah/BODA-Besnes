<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://msgqzgzoslearaprgiqq.supabase.co https://api.emailjs.com wss://msgqzgzoslearaprgiqq.supabase.co; font-src 'self' data:; base-uri 'self'; form-action 'self'" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <title>إدارة المنتجات - بوابة الشريك</title>
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <strong class="brand-title">BODA Partner Portal</strong>
      <div class="topbar-actions">
        <span id="currentUserLabel" class="pill">-</span>
        <button id="logoutBtn" type="button" class="btn-danger">تسجيل الخروج</button>
      </div>
      <nav class="tabs-nav">
        <a data-nav="products" href="products.html">المنتجات</a>
        <a data-nav="orders" href="orders.html">الطلبات</a>
        <a data-nav="account" href="account.html">الحساب</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap stack">
    <section class="section-card">
      <div class="section-head">
        <h2>إضافة / تعديل منتج</h2>
        <span class="pill">عدد المنتجات: <strong id="productsCount">0</strong></span>
      </div>
      <p class="muted">يتم الحفظ مباشرة في قاعدة البيانات مع دعم جدولي <code>products</code> و <code>my_products</code>.</p>
    </section>

    <p id="productsStatus" class="status-note hidden" aria-live="polite"></p>

    <section class="section-card">
      <form id="productForm" class="portal-form">
        <div class="field-grid">
          <div class="field">
            <label for="productName">اسم المنتج</label>
            <input id="productName" type="text" required />
          </div>
          <div class="field">
            <label for="productCategory">التصنيف</label>
            <input id="productCategory" type="text" required />
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="productPrice">السعر</label>
            <input id="productPrice" type="number" min="0" step="0.01" required />
          </div>
          <div class="field">
            <label for="productDiscount">نسبة الخصم %</label>
            <input id="productDiscount" type="number" min="0" max="100" value="0" />
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="productQuantity">الكمية</label>
            <input id="productQuantity" type="number" min="0" value="1" required />
          </div>
          <div class="field">
            <label for="productPhone">رقم هاتف للتواصل</label>
            <input id="productPhone" type="tel" />
          </div>
        </div>

        <div class="field">
          <label for="productDescription">الوصف</label>
          <textarea id="productDescription" rows="3" required></textarea>
        </div>

        <div class="field">
          <label for="productImages">روابط الصور (افصل بفاصلة)</label>
          <input id="productImages" type="text" placeholder="https://example.com/1.jpg, https://example.com/2.jpg" />
        </div>

        <div class="inline-actions">
          <button type="submit" class="btn-primary">إضافة المنتج</button>
          <button id="cancelEditBtn" type="button" class="btn-secondary hidden">إلغاء التعديل</button>
        </div>
      </form>
    </section>

    <section class="section-card">
      <div class="section-head">
        <h3>منتجاتي</h3>
      </div>
      <div id="productsGrid" class="products-grid"></div>
    </section>
  </main>

  <script src="../js/supabase.js"></script>
  <script src="../assets/js/config.js?v=20260309-3"></script>
  <script src="../assets/js/security-utils.js?v=20260309-3"></script>
  <script src="../assets/js/supabase-service.js?v=20260309-3"></script>
  <script src="../assets/js/session.js?v=20260309-3"></script>
  <script src="../assets/js/dashboard-products.js?v=20260309-3"></script>
</body>
</html>
